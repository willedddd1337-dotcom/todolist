
<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Todo List</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: #1a1a2e;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 60px 20px;
      font-family: 'Inter', sans-serif;
      color: #e2e0f0;
    }

    .container { width: 100%; max-width: 520px; }

    h1 {
      font-size: 2rem;
      font-weight: 600;
      letter-spacing: -0.03em;
      margin-bottom: 8px;
      background: linear-gradient(135deg, #c77dff 0%, #9b5de5 60%, #7b2fff 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .subtitle { font-size: 0.85rem; color: #6b6892; margin-bottom: 36px; }

    form { display: flex; gap: 10px; margin-bottom: 32px; }

    input[type="text"] {
      flex: 1;
      background: #2a2a45;
      border: 1px solid #3d3a60;
      border-radius: 12px;
      padding: 13px 18px;
      font-size: 0.95rem;
      font-family: 'Inter', sans-serif;
      color: #e2e0f0;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    input[type="text"]::placeholder { color: #4e4b72; }
    input[type="text"]:focus {
      border-color: #9b5de5;
      box-shadow: 0 0 0 3px rgba(155, 93, 229, 0.18);
    }

    button[type="submit"] {
      background: #9b5de5;
      color: #fff;
      border: none;
      border-radius: 12px;
      padding: 13px 22px;
      font-size: 0.9rem;
      font-weight: 600;
      font-family: 'Inter', sans-serif;
      cursor: pointer;
      transition: background 0.2s, box-shadow 0.2s, transform 0.1s;
    }

    button[type="submit"]:hover {
      background: #b06ef5;
      box-shadow: 0 0 18px rgba(155, 93, 229, 0.45);
    }

    button[type="submit"]:active { transform: scale(0.97); }

    .todo-list { display: flex; flex-direction: column; gap: 10px; }

    .todo-item {
      display: flex;
      align-items: center;
      background: #2a2a45;
      border: 1px solid #3d3a60;
      border-radius: 12px;
      padding: 14px 18px;
      gap: 12px;
      transition: border-color 0.2s, background 0.2s;
    }

    .todo-item:hover { border-color: #6b4fa8; background: #30305a; }

    .todo-dot {
      width: 8px; height: 8px;
      background: #9b5de5;
      border-radius: 50%;
      flex-shrink: 0;
      transition: background 0.2s;
    }

    .todo-item:hover .todo-dot { background: #c77dff; }

    .todo-text {
      flex: 1;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.9rem;
      color: #ccc9e8;
      word-break: break-word;
    }

    .delete-btn {
      color: #4e4b72;
      text-decoration: none;
      font-size: 0.8rem;
      font-weight: 600;
      padding: 4px 10px;
      border-radius: 7px;
      border: 1px solid transparent;
      transition: color 0.2s, border-color 0.2s, background 0.2s;
    }

    .delete-btn:hover {
      color: #ff6b9d;
      border-color: rgba(255, 107, 157, 0.35);
      background: rgba(255, 107, 157, 0.08);
    }

    .empty { text-align: center; padding: 48px 0; }
    .empty-icon { font-size: 2.5rem; margin-bottom: 14px; opacity: 0.4; }
    .empty h2 { font-size: 1rem; font-weight: 500; color: #5a577e; }
    .empty p { font-size: 0.82rem; margin-top: 6px; color: #3d3a5c; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Todo list</h1>
    <p class="subtitle">Залишайся зосередженим — одне завдання за раз.</p>

    <form method="post" action="/add">
      <input type="text" name="todo" placeholder="Нове завдання..." required>
      <button type="submit">+ Додати</button>
    </form>

    {% if text %}
    <div class="todo-list">
      {% for todo in text %}
      <div class="todo-item">
        <span class="todo-dot"></span>
        <span class="todo-text">{{ todo }}</span>
        <a href="/delete/{{ loop.index0 }}" class="delete-btn">✕</a>
      </div>
      {% endfor %}
    </div>
    {% endif %}

    {% if not text %}
    <div class="empty">
      <div class="empty-icon">✦</div>
      <h2>Список порожній</h2>
      <p>Додай перше завдання вище.</p>
    </div>
    {% endif %}
  </div>
</body>
</html>
