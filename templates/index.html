<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Todo List</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #0d0d0f;
      --bg2:     #17171c;
      --bg3:     #13131a;
      --border:  #252530;
      --border2: #1e1e26;
      --txt1:    #f0eff5;
      --txt2:    #c8c7d8;
      --txt3:    #3a3a50;
      --txt4:    #2e2e3c;
      --txt5:    #3d3d45;
      --accent:  #5a4fcf;
      --accent2: #4a3fbf;
    }

    body.light {
      --bg:      #f4f3fa;
      --bg2:     #ffffff;
      --bg3:     #eceaf6;
      --border:  #dddce8;
      --border2: #e8e7f2;
      --txt1:    #0d0c14;
      --txt2:    #3a3850;
      --txt3:    #9896b0;
      --txt4:    #b0aec8;
      --txt5:    #7a7890;
    }

    body {
      min-height: 100vh;
      background: var(--bg);
      font-family: 'Inter', sans-serif;
      color: var(--txt1);
      transition: background .3s, color .3s;
      padding: 56px 0 100px;
    }

    .container {
      width: 100%;
      max-width: 620px;
      margin: 0 auto;
      padding: 0 32px;
      animation: fadeUp .5s cubic-bezier(.22,.68,0,1.2) both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: none; }
    }

    .top-bar {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      margin-bottom: 48px;
    }

    .greeting {
      font-size: 11px;
      font-weight: 500;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: var(--txt5);
      margin-bottom: 8px;
      transition: color .3s;
    }

    h1 {
      font-size: 40px;
      font-weight: 300;
      letter-spacing: -.05em;
      color: var(--txt1);
      line-height: 1;
      transition: color .3s;
    }

    h1 strong { font-weight: 600; }

    .top-right {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 12px;
      padding-top: 4px;
    }

    .date-chip {
      font-size: 12px;
      color: var(--txt3);
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 5px 14px;
      white-space: nowrap;
      transition: all .3s;
    }

    .theme-btn {
      width: 52px;
      height: 28px;
      border-radius: 99px;
      background: var(--bg2);
      border: 1px solid var(--border);
      cursor: pointer;
      position: relative;
      transition: background .3s, border-color .3s;
      flex-shrink: 0;
    }

    .theme-btn::after {
      content: '';
      position: absolute;
      top: 4px;
      left: 4px;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: var(--txt3);
      transition: transform .28s cubic-bezier(.22,.68,0,1.2), background .3s;
    }

    body.light .theme-btn::after {
      transform: translateX(24px);
      background: var(--accent);
    }

    .theme-icon {
      position: absolute;
      font-size: 11px;
      top: 50%;
      transform: translateY(-50%);
      pointer-events: none;
      line-height: 1;
      transition: opacity .2s;
    }

    .theme-icon.moon { right: 6px; }
    .theme-icon.sun  { left: 6px; opacity: 0; }
    body.light .theme-icon.moon { opacity: 0; }
    body.light .theme-icon.sun  { opacity: 1; }

    .input-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 40px;
    }

    .input-row input[type="text"] {
      flex: 1;
      min-width: 0;
      height: 52px;
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 26px;
      padding: 0 24px;
      font-size: 15px;
      font-family: 'Inter', sans-serif;
      color: var(--txt1);
      outline: none;
      letter-spacing: -.01em;
      transition: border-color .2s, box-shadow .2s, background .3s, color .3s;
    }

    .input-row input[type="text"]::placeholder { color: var(--txt3); }

    .input-row input[type="text"]:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(90,79,207,.14);
    }

    .input-row button[type="submit"] {
      flex-shrink: 0;
      height: 52px;
      padding: 0 26px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 26px;
      font-size: 14px;
      font-weight: 600;
      font-family: 'Inter', sans-serif;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
      white-space: nowrap;
      letter-spacing: -.01em;
      transition: background .15s, transform .1s, box-shadow .15s;
    }

    .input-row button[type="submit"]:hover {
      background: var(--accent2);
      box-shadow: 0 4px 20px rgba(90,79,207,.3);
    }

    .input-row button[type="submit"]:active {
      transform: scale(.96);
      box-shadow: none;
    }

    .section-head {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 16px;
    }

    .section-line {
      flex: 1;
      height: 1px;
      background: var(--border2);
      transition: background .3s;
    }

    .section-txt {
      font-size: 11px;
      font-weight: 500;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: var(--txt3);
      white-space: nowrap;
      transition: color .3s;
    }

    .todo-list { display: flex; flex-direction: column; gap: 2px; }

    .todo-item {
      display: flex;
      align-items: center;
      border-radius: 12px;
      overflow: hidden;
      transition: background .15s;
      animation: rowIn .38s cubic-bezier(.22,.68,0,1.2) both;
    }

    @keyframes rowIn {
      from { opacity: 0; transform: translateX(-12px); }
      to   { opacity: 1; transform: none; }
    }

    .todo-item:nth-child(1)  { animation-delay: .04s; }
    .todo-item:nth-child(2)  { animation-delay: .09s; }
    .todo-item:nth-child(3)  { animation-delay: .14s; }
    .todo-item:nth-child(4)  { animation-delay: .19s; }
    .todo-item:nth-child(5)  { animation-delay: .24s; }
    .todo-item:nth-child(6)  { animation-delay: .29s; }
    .todo-item:nth-child(7)  { animation-delay: .34s; }
    .todo-item:nth-child(8)  { animation-delay: .39s; }
    .todo-item:nth-child(9)  { animation-delay: .44s; }
    .todo-item:nth-child(10) { animation-delay: .49s; }

    .todo-item:hover { background: var(--bg3); }
    .todo-item:hover .del-btn { opacity: 1; }
    .todo-item:hover .todo-num { color: var(--accent); }
    .todo-item:hover .todo-text { color: var(--txt1); }

    .todo-num {
      width: 52px;
      flex-shrink: 0;
      font-size: 11px;
      font-weight: 500;
      color: var(--txt4);
      padding: 20px 0 20px 6px;
      text-align: right;
      font-variant-numeric: tabular-nums;
      letter-spacing: .02em;
      transition: color .15s;
    }

    .todo-body {
      flex: 1;
      padding: 16px 18px;
      border-bottom: 1px solid var(--border2);
      display: flex;
      align-items: center;
      gap: 12px;
      transition: border-color .3s;
    }

    .todo-item:last-child .todo-body { border-bottom: none; }

    .todo-text {
      font-size: 15px;
      color: var(--txt2);
      letter-spacing: -.015em;
      line-height: 1.45;
      word-break: break-word;
      transition: color .15s, opacity .2s, text-decoration .2s;
    }

    .todo-text.done {
      text-decoration: line-through;
      opacity: 0.35;
    }

    /* Custom checkbox */
    .check-form {
      display: flex;
      align-items: center;
      flex-shrink: 0;
    }

    .check-form input[type="checkbox"] {
      appearance: none;
      -webkit-appearance: none;
      width: 20px;
      height: 20px;
      border-radius: 6px;
      border: 1.5px solid var(--border);
      background: transparent;
      cursor: pointer;
      position: relative;
      transition: border-color .2s, background .2s;
      flex-shrink: 0;
    }

    .check-form input[type="checkbox"]:hover {
      border-color: var(--accent);
    }

    .check-form input[type="checkbox"]:checked {
      background: var(--accent);
      border-color: var(--accent);
    }

    .check-form input[type="checkbox"]:checked::after {
      content: '';
      position: absolute;
      left: 5px;
      top: 2px;
      width: 6px;
      height: 10px;
      border: 2px solid #fff;
      border-top: none;
      border-left: none;
      transform: rotate(45deg);
    }

    .del-btn {
      width: 36px;
      height: 36px;
      margin-right: 10px;
      flex-shrink: 0;
      border-radius: 9px;
      display: flex;
      align-items: center;
      justify-content: center;
      text-decoration: none;
      color: var(--txt3);
      opacity: 0;
      transition: background .15s, color .15s, opacity .18s, transform .18s;
    }

    .del-btn svg { transition: transform .24s cubic-bezier(.22,.68,0,1.2); }

    .del-btn:hover {
      background: rgba(220,50,50,.1);
      color: #e05555;
      transform: scale(1.1);
    }

    .del-btn:hover svg { transform: rotate(90deg); }

    .empty {
      padding: 72px 0;
      text-align: center;
      animation: fadeUp .4s ease both;
    }

    .empty-ring {
      width: 56px;
      height: 56px;
      border-radius: 50%;
      border: 1px solid var(--border2);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 20px;
      transition: border-color .3s;
    }

    .empty h2 {
      font-size: 15px;
      font-weight: 500;
      color: var(--txt3);
      margin-bottom: 6px;
      letter-spacing: -.02em;
      transition: color .3s;
    }

    .empty p { font-size: 13px; color: var(--txt4); transition: color .3s; }
  </style>
</head>
<body id="body">
  <div class="container">

    <div class="top-bar">
      <div>
        <p class="greeting">Мій простір</p>
        <h1>Todo <strong>list</strong></h1>
      </div>
      <div class="top-right">
        <div class="date-chip" id="date-chip"></div>
        <button class="theme-btn" onclick="toggleTheme()" aria-label="Змінити тему">
          <span class="theme-icon moon">🌙</span>
          <span class="theme-icon sun">☀️</span>
        </button>
      </div>
    </div>

    <form method="post" action="/add" class="input-row">
      <input type="text" name="todo" placeholder="Що потрібно зробити?" required autocomplete="off">
      <button type="submit">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
          <path d="M7 1.5v11M1.5 7h11" stroke="white" stroke-width="2" stroke-linecap="round"/>
        </svg>
        Додати
      </button>
    </form>

    {% if tasks %}
    <div class="section-head">
      <div class="section-line"></div>
      <span class="section-txt">Завдання · {{ tasks|length }}</span>
      <div class="section-line"></div>
    </div>
    <div class="todo-list">
      {% for todo in tasks %}
      <div class="todo-item">
        <span class="todo-num">{{ '%02d' % loop.index }}</span>
        <div class="todo-body">
          <form class="check-form" method="post" action="/complete/{{ todo.id }}">
            <input type="checkbox"
                   {% if todo.completed %}checked{% endif %}
                   onchange="this.form.submit()">
          </form>
          <span class="todo-text {% if todo.completed %}done{% endif %}">{{ todo.title }}</span>
        </div>
        <a href="/delete/{{ todo.id }}" class="del-btn" title="Видалити">
          <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
            <path d="M1 1l10 10M11 1L1 11" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/>
          </svg>
        </a>
      </div>
      {% endfor %}
    </div>
    {% endif %}

    {% if not tasks %}
    <div class="empty">
      <div class="empty-ring">
        <svg width="22" height="22" viewBox="0 0 22 22" fill="none">
          <path d="M11 4v14M4 11h14" stroke="var(--txt3)" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
      </div>
      <h2>Список порожній</h2>
      <p>Додай перше завдання вище.</p>
    </div>
    {% endif %}

  </div>

  <script>
    const days   = ['нд','пн','вт','ср','чт','пт','сб'];
    const months = ['січ','лют','бер','квіт','трав','черв','лип','серп','вер','жовт','лист','груд'];
    const now = new Date();
    document.getElementById('date-chip').textContent =
      `${days[now.getDay()]}, ${now.getDate()} ${months[now.getMonth()]}`;

    if (localStorage.getItem('theme') === 'light') {
      document.getElementById('body').classList.add('light');
    }

    function toggleTheme() {
      const body = document.getElementById('body');
      body.classList.toggle('light');
      localStorage.setItem('theme', body.classList.contains('light') ? 'light' : 'dark');
    }
  </script>
</body>
</html>
